# SUITE.lock — the one-ceremony pin file (plan D1, §2.10, §22.1-10; bead franken_lean-xwf).
#
# This file governs, in ONE reviewed ceremony: the Rust toolchain pin, the FrankenSuite
# repo commits, the Reference pin, and the Corpus pin. CI builds only from this lock:
# `tools/structure-guard` fails when rust-toolchain.toml, ci/WORKSPACE_GRAPH.txt
# suite-deps, or ci/CLOSURE_ALLOWLIST.txt drift from it. Amending any row is a reviewed
# pin ceremony (§22.5 epoch policy for the reference/corpus rows), never a side effect.
#
# Grammar (line-oriented; '#' starts a comment):
#   schema fln-suite-lock/1
#   rust-nightly <channel>            (must equal rust-toolchain.toml [toolchain].channel)
#   rust-release <version>
#   rust-commit <hash>                (rustc -vV commit-hash)
#   target <triple>                   (certified build targets; repeatable)
#   suite <repo> commit=<hash> path=<abs-path>
#   crate <package> repo=<repo>       (maps an allowed suite package to its pinned repo)
#   reference <org/repo> tag=<tag> commit=<hash>
#   corpus <org/repo> tag=<tag> commit=<hash>

schema fln-suite-lock/1

# ---- the Rust toolchain (exact; no or-later) ------------------------------------------
rust-nightly nightly-2026-07-13
rust-release 1.99.0-nightly
rust-commit 77cf889bc178ddb44d6a1c78e5a820b5abb31d8d
target x86_64-unknown-linux-gnu

# ---- the FrankenSuite (D1 closed universe), pinned at exact commits --------------------
suite asupersync       commit=e464a484cb65c1a55be0d9c925e6e9c20318edcb path=/dp/asupersync
suite frankensqlite    commit=fd569bb49a38361848ca88bf17a7b01b53308a45 path=/dp/frankensqlite
suite franken_networkx commit=9d710b1c33e99412c94de7fa4de2f7ce4954110f path=/dp/franken_networkx
suite frankensearch    commit=51209c4628b8f798c315adb07459d1473021dba4 path=/dp/frankensearch
suite frankentui       commit=af2df3e6bdd06abafe03a0ef1e4960114918b26b path=/dp/frankentui
suite franken_markdown commit=236454e26f17fdd1b9e23902cc11633146bba95d path=/dp/franken_markdown
suite fastmcp_rust     commit=0e00cae2678987d3518fec2a6388bc0285fb5b92 path=/dp/fastmcp_rust
suite atp              commit=1df65ca1f483418ccdf9c6c977184a83df4df531 path=/dp/atp
# optional tier — feature-gated, never on the critical path (plan §2):
suite frankentorch     commit=e4c6bdd5ec629ae70b40da9314da345ade012ca7 path=/dp/frankentorch
# franken_node is NOT pinned: it is absent from this machine and unused. It enters this
# lock (and the WORKSPACE_GRAPH suite-dep allowlist) via its own pin ceremony on first use.

# ---- allowed suite packages, mapped to their pinned repos ------------------------------
crate asupersync       repo=asupersync
crate frankensqlite    repo=frankensqlite
crate franken_networkx repo=franken_networkx
crate frankensearch    repo=frankensearch
crate frankentui       repo=frankentui
crate franken_markdown repo=franken_markdown
crate fmd-font         repo=franken_markdown
crate fmd-math         repo=franken_markdown
crate fastmcp_rust     repo=fastmcp_rust
crate atp              repo=atp
crate frankentorch     repo=frankentorch

# ---- the Reference (Oracle-Only, D8) and the Corpus ------------------------------------
reference leanprover/lean4 tag=v4.32.0 commit=8c9756b28d64dab099da31a4c09229a9e6a2ef35
corpus leanprover-community/mathlib4 tag=v4.32.0 commit=81a5d257c8e410db227a6665ed08f64fea08e997
